name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    # Windows runner: net472 (incl. the WPF shell) targets the .NET Framework.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore GPIBUtils-NG.sln

      # No NI-VISA is installed on the runner, so GpibUtils.Visa.Ni builds its
      # "NI-VISA unavailable" stub and the whole solution compiles hardware-free.
      - name: Build
        run: dotnet build GPIBUtils-NG.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GPIBUtils-NG.sln --configuration Release --no-build --verbosity normal
