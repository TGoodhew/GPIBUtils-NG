name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Least-privilege token: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) so the
# queue reflects only the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Windows runner: net472 (incl. the WPF shell) targets the .NET Framework.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache the global NuGet package folder keyed on the project files, so a
      # restore is near-instant when dependencies have not changed.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore GPIBUtils-NG.sln

      # No NI-VISA is installed on the runner, so GpibUtils.Visa.Ni builds its
      # "NI-VISA unavailable" stub and the whole solution compiles hardware-free.
      - name: Build
        run: dotnet build GPIBUtils-NG.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GPIBUtils-NG.sln --configuration Release --no-build --verbosity normal --logger trx

      # Publish the per-project .trx results even on failure, so a red build
      # shows which tests failed without scraping the console log.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: warn
